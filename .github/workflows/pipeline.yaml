name: Terraform CI

on:
  pull_request:
    branches: ["main"]

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: hashicorp/setup-terraform@v2

      - uses: terraform-linters/setup-tflint@v3

      - run: tflint

      - uses: bridgecrewio/checkov-action@master

      - run: terraform init

      - run: terraform validate
