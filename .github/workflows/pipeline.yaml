name: Terraform CI

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: terraform-linters/setup-tflint@v4

      - run: tflint

      - uses: bridgecrewio/checkov-action@master

      - run: terraform init

      - run: terraform validate
